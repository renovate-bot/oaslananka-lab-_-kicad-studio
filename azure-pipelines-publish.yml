trigger: none
pr: none

parameters:
  - name: publishToOpenVsx
    type: boolean
    default: false

variables:
  - group: kicadstudio-secrets
  - name: NodeVersion
    value: '24.14.1'

stages:
  - stage: Package
    displayName: Prepare Marketplace package
    jobs:
      - job: BuildAndPackage
        displayName: Build production VSIX
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            displayName: Use Node.js $(NodeVersion)
            inputs:
              version: $(NodeVersion)
          - script: npm install -g npm@11.13.0
            displayName: Pin npm toolchain
          - script: npm ci
            displayName: Install dependencies
          - script: npm run check:ci
            displayName: CI package gate
          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)"
              cp ./*.vsix "$(Build.ArtifactStagingDirectory)/"
            displayName: Stage VSIX artifact
          - publish: $(Build.ArtifactStagingDirectory)
            displayName: Publish VSIX artifact
            artifact: kicadstudio-vsix

  - stage: AwaitApproval
    displayName: Await owner approval
    dependsOn: Package
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - job: ManualApproval
        displayName: Manual approval gate
        pool: server
        timeoutInMinutes: 4320
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              instructions: |
                Review the packaged VSIX artifact and approve only when you want to publish KiCad Studio to the VS Code Marketplace.
                This Azure DevOps pipeline is intentionally manual fallback only.
                Primary automated CI/CD is owned by the oaslananka-lab GitHub organization repository.
              onTimeout: reject

  - stage: Publish
    displayName: Publish to VS Code Marketplace
    dependsOn: AwaitApproval
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - job: PublishMarketplace
        displayName: Publish approved release
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            displayName: Use Node.js $(NodeVersion)
            inputs:
              version: $(NodeVersion)
          - script: npm install -g npm@11.13.0
            displayName: Pin npm toolchain
          - script: npm ci
            displayName: Install dependencies
          - script: npm run audit:ci
            displayName: Audit dependencies
          - script: npm run build:prod
            displayName: Production build
          - bash: PUBLISH_TARGET=vs-marketplace bash scripts/publish.sh
            displayName: Publish extension
            env:
              VSCE_PAT: $(VSCE_PAT)
          - ${{ if eq(parameters.publishToOpenVsx, true) }}:
              - bash: PUBLISH_TARGET=open-vsx bash scripts/publish.sh
                displayName: Publish to Open VSX
                env:
                  OVSX_PAT: $(OVSX_PAT)
