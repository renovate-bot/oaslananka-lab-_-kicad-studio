name: Jules CI Fixer

on:
  # workflow_run is intentionally limited to same-repository failed runs below.
  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows:
      - CI
      - KiCad Studio CI
      - Lint
      - Lint (fast)
      - Typecheck
      - Tests
      - Package
      - VSIX Package
      - Security
      - Gitleaks
      - CodeQL
      - Docs
      - Marketplace Dry Run
      - Open VSX Dry Run
    types:
      - completed

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: jules-ci-fixer-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  invoke:
    name: Invoke Jules for failed CI
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      !startsWith(github.event.workflow_run.head_branch, 'jules/') &&
      !startsWith(github.event.workflow_run.head_branch, 'dependabot/') &&
      !startsWith(github.event.workflow_run.head_branch, 'release-please--') &&
      !contains(
        fromJSON('["Release","Publish","Marketplace Publish","Open VSX Publish","GitHub Release","Mirror Personal","Mirror Releases Back","Sync from canonical","Jules Manual","Jules CI Fixer","Jules Dependency Fixer","Jules Issue Agent"]'),
        github.event.workflow_run.name
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      pull-requests: read
    steps:
      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@bff7875eaa123cac6742b7cfc51005b95ba4d566
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true
          include_commit_log: true
          prompt: |
            Repository: oaslananka-lab/kicad-studio
            Personal showcase mirror: oaslananka/kicad-studio

            A trusted same-repository CI workflow failed.

            Failed workflow:
            - Name: ${{ github.event.workflow_run.name }}
            - URL: ${{ github.event.workflow_run.html_url }}
            - Branch: ${{ github.event.workflow_run.head_branch }}
            - Commit: ${{ github.event.workflow_run.head_sha }}
            - Conclusion: ${{ github.event.workflow_run.conclusion }}

            Required process:
            1. Inspect the failed run and repository state.
            2. Identify the root cause.
            3. Implement the smallest safe fix.
            4. Add or update regression coverage when the failure is testable.
            5. Run the exact project checks listed below.
            6. Open or update a PR only when validation passes.
            7. Include a checklist in the PR body with commands run and results.

            Hard constraints:
            - Do not publish anything.
            - Do not merge anything.
            - Do not modify, reveal, print, or request secrets.
            - Do not trigger VS Marketplace publish, Open VSX publish, npm publish, Docker publish, or production GitHub Releases.
            - Do not change marketplace/Open VSX/release secrets or credential docs unless the failed workflow explicitly proves a docs-only correction is required.
            - Do not weaken CI, lint, tests, security checks, branch protection, Workspace Trust, AI opt-in behavior, or MCP opt-in behavior.
            - Do not change publish/release workflows unless the failed workflow is a dry-run packaging workflow and the fix is minimal.

            Required validation:
            - corepack npm ci
            - corepack npm run format:check
            - corepack npm run lint
            - corepack npm run typecheck
            - corepack npm run test:unit
            - corepack npm test
            - corepack npm run build
            - corepack npm run package
            - corepack npm run workflows:lint
            - npm audit --audit-level=high
            - npx @vscode/vsce package
            - corepack npm run package:ovsx

            If a validation command is missing, add the script or document why it is not applicable. Never silently skip.
