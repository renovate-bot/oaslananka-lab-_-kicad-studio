name: Jules Issue Agent

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: jules-issue-agent-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  invoke:
    name: Invoke Jules for trusted issue
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      github.event.issue.user.login == 'oaslananka' &&
      contains(fromJSON('["jules","bug","ci-fix","dependency-fix","mcp-integration"]'), github.event.label.name)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@bff7875eaa123cac6742b7cfc51005b95ba4d566
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_last_commit: false
          include_commit_log: true
          prompt: |
            Repository: oaslananka-lab/kicad-studio
            Personal showcase mirror: oaslananka/kicad-studio

            Trusted issue trigger:
            - Issue: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - URL: ${{ github.event.issue.html_url }}
            - Triggering label: ${{ github.event.label.name }}
            - Author: ${{ github.event.issue.user.login }}

            Issue body:
            ${{ github.event.issue.body }}

            Required process:
            1. Diagnose the issue.
            2. Implement the smallest safe fix.
            3. Add regression tests when testable.
            4. Run validation.
            5. Open or update a PR with commands and results.

            Hard constraints:
            - Do not publish anything.
            - Do not merge anything.
            - Do not modify, reveal, print, or request secrets.
            - Do not trigger VS Marketplace publish, Open VSX publish, npm publish, Docker publish, or production GitHub Releases.
            - Do not alter marketplace/release workflows unless the trusted issue explicitly requests a minimal fix and the PR documents it.
            - Do not weaken CI, tests, security checks, Workspace Trust, AI opt-in behavior, or MCP opt-in behavior.
            - Do not execute fork code or use pull_request_target.

            Required validation:
            - corepack npm ci
            - corepack npm run format:check
            - corepack npm run lint
            - corepack npm run typecheck
            - corepack npm run test:unit
            - corepack npm test
            - corepack npm run build
            - corepack npm run package
            - corepack npm run workflows:lint
            - npm audit --audit-level=high
            - npx @vscode/vsce package
            - corepack npm run package:ovsx

            If a validation command is missing, add the script or document why it is not applicable. Never silently skip.
