name: Stale

on:
  schedule:
    - cron: '33 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stale:
    name: Stale issue hygiene
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: status:waiting-feedback
          stale-pr-label: status:waiting-feedback
          exempt-issue-labels: security,release:blocking,status:blocked
          exempt-pr-labels: security,release:blocking,status:blocked
