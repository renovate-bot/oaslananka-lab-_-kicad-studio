name: Scorecard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '11 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scorecard:
    name: Scorecard analysis
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          results_format: json
          results_file: scorecard.json
          publish_results: true
      - name: Upload Scorecard results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scorecard-results
          path: scorecard.json
          if-no-files-found: error
          retention-days: 5

  scorecard-gate:
    name: Scorecard minimum score
    needs: scorecard
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Download Scorecard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: scorecard-results
          path: .
      - name: Enforce minimum score
        shell: bash
        run: |
          score="$(jq -r '.score' scorecard.json)"
          echo "Scorecard score: ${score}"
          awk -v score="${score}" 'BEGIN { if (score < 7.0) exit 1 }'
