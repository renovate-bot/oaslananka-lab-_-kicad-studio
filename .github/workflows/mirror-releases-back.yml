name: Mirror releases back to canonical

on:
  release:
    types: [published, edited]

permissions:
  contents: read

jobs:
  mirror-release:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo oaslananka-lab/kicad-studio --dir assets || true

      - name: Re-publish on canonical
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${{ github.event.release.tag_name }}" --repo oaslananka/kicad-studio >/dev/null 2>&1; then
            gh release edit "${{ github.event.release.tag_name }}" \
              --repo oaslananka/kicad-studio \
              --title "${{ github.event.release.name }}" \
              --notes "${{ github.event.release.body }}"
            if compgen -G "assets/*" > /dev/null; then
              gh release upload "${{ github.event.release.tag_name }}" \
                --repo oaslananka/kicad-studio assets/* --clobber
            fi
          else
            args=(--repo oaslananka/kicad-studio \
                  --title "${{ github.event.release.name }}" \
                  --notes "${{ github.event.release.body }}" \
                  --target "${{ github.event.release.target_commitish }}")
            if compgen -G "assets/*" > /dev/null; then
              gh release create "${{ github.event.release.tag_name }}" "${args[@]}" assets/*
            else
              gh release create "${{ github.event.release.tag_name }}" "${args[@]}"
            fi
          fi
