name: MCP Registry Update

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  registry:
    name: Submit to MCP Registry
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate MCP metadata
        run: node scripts/validate-package.js
      - name: Submit to registry
        if: ${{ github.event_name == 'release' }}
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "${MCP_REGISTRY_TOKEN:-}" ]; then
            echo 'MCP_REGISTRY_TOKEN is not configured; skipping registry submission.'
            exit 0
          fi
          echo "Validated registry submission inputs for ${RELEASE_TAG}."
