name: MCP Registry Update

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.6.0)'
        required: false

permissions:
  contents: read

jobs:
  registry:
    name: Submit to MCP Registry
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Validate MCP metadata
        run: node scripts/validate-package.js

      - name: Submit to registry
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          WORKFLOW_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${RELEASE_TAG:-${WORKFLOW_VERSION:-}}"
          echo "Publishing version ${VERSION} to MCP Registry"
          # Adjust this command to match your MCP registry CLI or API.
          # Example: npx @modelcontextprotocol/registry-cli publish --token "$MCP_REGISTRY_TOKEN"
          echo "::notice::MCP Registry submission step - wire up registry CLI here."
