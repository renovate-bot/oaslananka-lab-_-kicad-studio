name: KiCad Studio Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to VS Code Marketplace after packaging'
        required: true
        default: false
        type: boolean
      publishOpenVsx:
        description: 'Also publish to Open VSX'
        required: true
        default: false
        type: boolean

jobs:
  package:
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.route.outputs.should_publish }}
      should_publish_open_vsx: ${{ steps.route.outputs.should_publish_open_vsx }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          package-manager-cache: false
      - id: route
        name: Decide release route
        shell: bash
        run: |
          should_publish=false
          should_publish_open_vsx=false
          if [ "${{ github.repository_owner }}" = "oaslananka-lab" ] && [ "${{ github.event_name }}" = "push" ]; then
            should_publish=true
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" = "true" ]; then
            should_publish=true
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publishOpenVsx }}" = "true" ]; then
            should_publish_open_vsx=true
          fi
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "should_publish_open_vsx=$should_publish_open_vsx" >> "$GITHUB_OUTPUT"
      - run: npm install -g npm@11.13.0
      - run: npm ci
      - run: npm run check:ci
      - name: Release routing notice
        run: |
          if [ "${{ github.repository_owner }}" = "oaslananka-lab" ]; then
            echo "oaslananka-lab owns primary CI/CD. Tag builds may publish after the GitHub Environment approval gate."
          else
            echo "Personal GitHub mirror is manual-only. This workflow packages unless manual publish input is enabled."
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: kicadstudio-vsix
          path: '*.vsix'

  publish-marketplace:
    needs: package
    if: needs.package.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: marketplace
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          package-manager-cache: false
      - run: npm install -g npm@11.13.0
      - run: npm ci
      - run: npm run build:prod
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Publish extension with Doppler secrets
        run: doppler run --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" -- npm run publish
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ secrets.DOPPLER_CONFIG }}

  publish-open-vsx:
    needs: package
    if: needs.package.outputs.should_publish_open_vsx == 'true'
    runs-on: ubuntu-latest
    environment: open-vsx
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          package-manager-cache: false
      - run: npm install -g npm@11.13.0
      - run: npm ci
      - run: npm run build:prod
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Publish Open VSX package with Doppler secrets
        run: doppler run --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" -- npx ovsx publish -p "$OVSX_PAT"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
          DOPPLER_CONFIG: ${{ secrets.DOPPLER_CONFIG }}
