name: Jules Dependency Fixer

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Dependency triage mode.
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - consolidate-dependabot
          - security-only
          - socket-alerts
      max_prs:
        description: Maximum open dependency PRs to inspect.
        required: true
        default: 20
        type: string
      target_branch:
        description: Branch Jules should start from.
        required: true
        default: main
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: jules-dependency-fixer-${{ github.repository }}-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  invoke:
    name: Invoke Jules for dependency triage
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ inputs.target_branch }}
          include_last_commit: false
          include_commit_log: true
          prompt: |
            Repository: oaslananka-lab/kicad-studio
            Personal showcase mirror: oaslananka/kicad-studio
            Mode: ${{ inputs.mode }}
            Max dependency PRs to inspect: ${{ inputs.max_prs }}
            Controlled branch to create or update: chore/dependency-hardening-jules

            Purpose:
            Consolidate Dependabot and Socket dependency waves into one controlled maintainer-style branch. Do not blindly merge dependency PRs one by one.

            Hard constraints:
            - Do not publish anything.
            - Do not merge anything.
            - Do not close dependency PRs unless there is a clear documented incompatibility.
            - Do not modify, reveal, print, or request secrets.
            - Do not trigger VS Marketplace publish, Open VSX publish, npm publish, Docker publish, or production GitHub Releases.
            - Keep AI/MCP features opt-in and preserve Workspace Trust restrictions.
            - Preserve VS Code extension compatibility, Node 24.x, npm 11.13.0+, package-lock determinism, vsce packaging, ovsx packaging, and MCP integration behavior.

            Required dependency triage:
            - List open Dependabot and Socket PRs.
            - Classify patch, minor, major, and security updates.
            - Identify breaking changes and migration notes.
            - Avoid upgrading @types/vscode beyond engines.vscode minimum unless official VS Code docs justify it.
            - Avoid upgrading @types/node beyond Node 24.x unless the runtime target changes intentionally.
            - Update package-lock.json correctly with npm, never by hand.
            - Document postponed major updates with reasons.
            - Update Dependabot grouping or ignore rules only when justified.
            - Open or update a PR only when validation is green.

            Required validation:
            - corepack npm ci
            - corepack npm run format:check
            - corepack npm run lint
            - corepack npm run typecheck
            - corepack npm run test:unit
            - corepack npm test
            - corepack npm run build
            - corepack npm run package
            - corepack npm run workflows:lint
            - npm audit --audit-level=high
            - npx @vscode/vsce package
            - corepack npm run package:ovsx

            If a validation command is missing, add the script or document why it is not applicable. Never silently skip.
