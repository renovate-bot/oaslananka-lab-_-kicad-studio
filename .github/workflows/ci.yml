name: CI

on:
  push:
    branches: ['**']
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  ci:
    name: Full CI Pipeline
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: npm ci
      - name: Run CI
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a npm exec -- task ci
          else
            npm exec -- task ci
          fi
        shell: bash
      - name: Publish test results
        if: always() && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        with:
          files: |
            **/junit.xml
            **/test-results.xml
      - name: Test summary
        if: always() && hashFiles('**/junit.xml') != ''
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86
        with:
          paths: '**/junit.xml'
      - name: Upload coverage to Codecov
        if: >-
          matrix.os == 'ubuntu-latest' &&
          github.actor != 'dependabot[bot]' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        # codecov/codecov-action@v6
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        continue-on-error: true
        with:
          files: coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
