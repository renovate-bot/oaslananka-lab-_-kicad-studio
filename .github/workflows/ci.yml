name: KiCad Studio CI

on:
  push:
    branches: ['**']
  pull_request:
  merge_group:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Full CI Pipeline
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: task install
      - name: Run CI
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a task ci
          else
            task ci
          fi
        shell: bash
      - name: Publish test results
        if: always() && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        with:
          files: |
            **/junit.xml
            **/test-results.xml
      - name: Test summary
        if: always() && hashFiles('**/junit.xml') != ''
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86
        with:
          paths: '**/junit.xml'
      - name: Install Doppler CLI
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]'
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "${DOPPLER_TOKEN}" ]; then
            echo "DOPPLER_TOKEN is required for Codecov upload on trusted CI runs." >&2
            exit 1
          fi
          doppler run --project all --config main -- bash -euo pipefail -c "
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov -f coverage/lcov.info -t \"\$CODECOV_TOKEN\"
          "
        shell: bash
