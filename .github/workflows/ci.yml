name: KiCad Studio CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Full CI Pipeline
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: task install
      - name: Run CI
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a task ci
          else
            task ci
          fi
        shell: bash
      - name: Publish test results
        if: always() && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/junit.xml
            **/test-results.xml
      - name: Test summary
        if: always() && hashFiles('**/junit.xml') != ''
        uses: test-summary/action@v2
        with:
          paths: '**/junit.xml'
      - name: Install Doppler CLI
        if: matrix.os == 'ubuntu-latest'
        uses: dopplerhq/cli-action@v4
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project all --config main -- bash -euo pipefail -c "
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov -f coverage/lcov.info -t \"\$CODECOV_TOKEN\"
          "
        shell: bash
