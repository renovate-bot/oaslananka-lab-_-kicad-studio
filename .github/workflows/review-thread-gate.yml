name: Review Thread Gate

on:
  pull_request_review:
  pull_request_review_comment:
  pull_request:
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  thread-gate:
    name: Review Thread Gate
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check unresolved review threads
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request?.number
              ?? context.payload.review?.pull_request?.number
              ?? context.payload.comment?.pull_request_number;

            if (!prNumber) {
              core.info('No PR number found, skipping.');
              return;
            }

            const query = `
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      nodes { isResolved isOutdated }
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query, { owner, repo, pr: prNumber });
            const threads = result.repository.pullRequest.reviewThreads.nodes;
            const unresolved = threads.filter(
              (thread) => !thread.isResolved && !thread.isOutdated
            );

            if (unresolved.length > 0) {
              core.setFailed(
                `${unresolved.length} unresolved review thread(s). Resolve all before merging.`
              );
            } else {
              core.info(`All ${threads.length} review threads resolved.`);
            }
