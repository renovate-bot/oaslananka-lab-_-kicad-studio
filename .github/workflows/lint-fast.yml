name: Lint (fast)

on:
  pull_request:
  push:
    branches: ['**']
  merge_group:

permissions:
  contents: read

concurrency:
  group: lint-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: npm ci
      - name: actionlint
        run: npm run workflows:lint
      - name: yamllint
        run: |
          pipx install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/

  node:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Check Node project
        id: node-project
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: steps.node-project.outputs.present == 'true'
        with:
          node-version-file: .node-version
      - if: steps.node-project.outputs.present == 'true'
        run: npm ci
      - name: Lint
        if: steps.node-project.outputs.present == 'true'
        run: npm run lint
