name: Lint (fast)

on:
  pull_request:
  push:
    branches: ['**']
  merge_group:

permissions:
  contents: read

concurrency:
  group: lint-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8
        with:
          fail-on-error: true
      - name: yamllint
        run: |
          pipx install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/

  node:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check Node project
        id: node-project
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.node-project.outputs.present == 'true'
        with:
          node-version-file: .node-version
      - if: steps.node-project.outputs.present == 'true'
        run: npm ci
      - name: Lint
        if: steps.node-project.outputs.present == 'true'
        run: npm run lint
