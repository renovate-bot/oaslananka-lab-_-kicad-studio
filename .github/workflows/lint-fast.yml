name: Lint (fast)

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: lint-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
      - name: yamllint
        run: |
          pipx install yamllint || pip install --user yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/ || true

  node:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check Node project
        id: node-project
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.node-project.outputs.present == 'true'
        with:
          node-version-file: package.json
      - if: steps.node-project.outputs.present == 'true'
        run: npm install --frozen-lockfile || npm install
      - name: Lint
        if: steps.node-project.outputs.present == 'true'
        run: npm run lint
