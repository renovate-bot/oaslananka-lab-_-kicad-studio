name: Lint (fast)

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: lint-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
      - name: yamllint
        run: |
          pipx install yamllint || pip install --user yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/ || true

  node:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
      - run: npm ci
      - name: Lint
        run: npm run lint
