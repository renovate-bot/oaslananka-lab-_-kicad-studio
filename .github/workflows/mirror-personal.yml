name: Mirror Personal Repository

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  mirror:
    name: Mirror personal repository
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push mirror
        env:
          MIRROR_TOKEN: ${{ secrets.PERSONAL_REPO_PUSH_TOKEN }}
        run: |
          if [ -z "${MIRROR_TOKEN:-}" ]; then
            echo 'PERSONAL_REPO_PUSH_TOKEN is not configured; skipping mirror.'
            exit 0
          fi
          git remote add personal "https://x-access-token:${MIRROR_TOKEN}@github.com/oaslananka/kicad-studio.git"
          git fetch origin main --tags
          git fetch personal main --tags --prune

          if git show-ref --verify --quiet refs/remotes/personal/main; then
            if git merge-base --is-ancestor refs/remotes/personal/main refs/remotes/origin/main; then
              git push personal refs/remotes/origin/main:main
            else
              echo 'Personal showcase main diverges from canonical main.'
              exit 1
            fi
          else
            git push personal refs/remotes/origin/main:main
          fi

          while IFS= read -r tag; do
            if git ls-remote --refs --exit-code --tags personal "refs/tags/${tag}" >/tmp/personal-tag.txt 2>/dev/null; then
              personal_sha="$(cut -f1 /tmp/personal-tag.txt)"
              canonical_sha="$(git rev-parse "refs/tags/${tag}")"
              if [ "${personal_sha}" != "${canonical_sha}" ]; then
                echo "Personal showcase tag ${tag} diverges from canonical."
                exit 1
              fi
            else
              git push personal "refs/tags/${tag}:refs/tags/${tag}"
            fi
          done < <(git tag --list 'v*.*.*')
