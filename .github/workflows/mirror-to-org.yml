name: Mirror to org

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:

permissions:
  contents: read

concurrency:
  group: mirror-to-org-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'oaslananka/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to org mirror
        env:
          MIRROR_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          git remote add org "https://x-access-token:${MIRROR_TOKEN}@github.com/oaslananka-lab/kicad-studio.git"
          git push org --prune --force --tags "+refs/heads/*:refs/heads/*"
