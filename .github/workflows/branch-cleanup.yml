name: Branch Cleanup

on:
  schedule:
    - cron: '12 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  audit:
    name: Branch cleanup audit
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Report merged branches
        run: |
          git fetch --all --prune
          git branch -r --merged origin/main | sed 's/^ *//' | grep -Ev '^(origin/HEAD|origin/main)$' || true
