name: Publish Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to publish
        required: true
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24.15.0'
  VSCE_VERSION: '3.9.1'
  OVSX_VERSION: '0.10.12'

defaults:
  run:
    shell: bash

concurrency:
  group: publish-production-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  package-extension:
    if: ${{ github.repository == 'oaslananka-lab/kicad-studio' }}
    outputs:
      package_name: ${{ steps.meta.outputs.name }}
      package_version: ${{ steps.meta.outputs.version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Resolve publish ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_SHA}}"
          if [[ ! "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "INVALID_PUBLISH_REF" >&2
            echo "Publish ref must resolve to a 40-character commit SHA." >&2
            exit 1
          fi
          echo "value=${ref}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.ref.outputs.value }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publish ref is on release channel
        env:
          PUBLISH_REF: ${{ steps.ref.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${PUBLISH_REF}" origin/main; then
            echo "PUBLISH_REF_NOT_ON_RELEASE_CHANNEL" >&2
            echo "Ref must be reachable from origin/main." >&2
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''
      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable
          corepack install
          corepack pnpm install --frozen-lockfile
      - name: Build extension
        run: |
          set -euo pipefail
          corepack pnpm run build --if-present
      - name: Validate extension manifest
        id: meta
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
          for (const key of ["publisher", "name", "version"]) {
            if (!p[key]) throw new Error(`EXTENSION_MANIFEST_INVALID ${key}`);
          }
          if (!p.engines?.vscode) throw new Error("EXTENSION_MANIFEST_INVALID engines.vscode");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `name=${p.name}\nversion=${p.version}\n`);
          NODE
      - name: Package VSIX
        run: |
          set -euo pipefail
          mkdir -p out
          package_name="${{ steps.meta.outputs.name }}"
          package_version="${{ steps.meta.outputs.version }}"
          npx --yes "@vscode/vsce@${VSCE_VERSION}" package --no-dependencies --out "out/${package_name}-${package_version}.vsix"
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vscode-extension-package
          path: out/*.vsix
          if-no-files-found: error

  vscode-marketplace:
    if: ${{ github.repository == 'oaslananka-lab/kicad-studio' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: package-extension
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: vscode-extension-package
          path: out
      - name: Publish VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          package_name="${{ needs.package-extension.outputs.package_name }}"
          package_version="${{ needs.package-extension.outputs.package_version }}"
          write_report() {
            local state="$1"
            local result="$2"
            local blocker="$3"
            REPORT_CHANNEL="vscode_marketplace" \
            REPORT_STATE="${state}" \
            REPORT_RESULT="${result}" \
            REPORT_BLOCKER="${blocker}" \
            REPORT_PACKAGE="${package_name}" \
            REPORT_VERSION="${package_version}" \
            REPORT_PATH="out/publish-report-vscode-marketplace.json" \
            node <<'NODE'
          const fs = require("fs");
          const report = {
            channel: process.env.REPORT_CHANNEL,
            state: process.env.REPORT_STATE,
            result: process.env.REPORT_RESULT,
            blocker: process.env.REPORT_BLOCKER,
            package: process.env.REPORT_PACKAGE,
            version: process.env.REPORT_VERSION,
            run_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            evidence: [],
          };
          fs.writeFileSync(process.env.REPORT_PATH, `${JSON.stringify(report, null, 2)}\n`);
          NODE
          }
          token="${VSCE_PAT:-${VS_MARKETPLACE_TOKEN:-}}"
          if [[ -z "${token}" ]]; then echo "MARKETPLACE_SECRET_MISSING"; write_report "failed" "external_blocker" "MARKETPLACE_SECRET_MISSING"; exit 1; fi
          vsix="$(find out -maxdepth 1 -type f -name '*.vsix' -print -quit)"
          if [[ -z "${vsix}" ]]; then echo "EXTENSION_PACKAGE_MISSING"; write_report "failed" "workflow_failure" "EXTENSION_PACKAGE_MISSING"; exit 1; fi
          set +e
          output="$(npx --yes "@vscode/vsce@${VSCE_VERSION}" publish --packagePath "${vsix}" --pat "${token}" 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "${output}"
          if [[ "${status}" -eq 0 ]]; then write_report "published" "fresh_publish_success" ""; exit 0; fi
          if printf '%s\n' "${output}" | grep -Eiq 'already.*published|version.*already|already exists'; then
            echo "MARKETPLACE_VERSION_ALREADY_PUBLISHED"
            write_report "already_published" "idempotent_noop" ""
            exit 0
          fi
          write_report "failed" "workflow_failure" "MARKETPLACE_PUBLISH_FAILED"
          exit "${status}"
      - name: Upload VS Code Marketplace publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-vscode-marketplace
          path: out/publish-report-vscode-marketplace.json
          if-no-files-found: ignore

  open-vsx:
    if: ${{ github.repository == 'oaslananka-lab/kicad-studio' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: package-extension
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: vscode-extension-package
          path: out
      - name: Publish Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          set -euo pipefail
          package_name="${{ needs.package-extension.outputs.package_name }}"
          package_version="${{ needs.package-extension.outputs.package_version }}"
          write_report() {
            local state="$1"
            local result="$2"
            local blocker="$3"
            REPORT_CHANNEL="open_vsx" \
            REPORT_STATE="${state}" \
            REPORT_RESULT="${result}" \
            REPORT_BLOCKER="${blocker}" \
            REPORT_PACKAGE="${package_name}" \
            REPORT_VERSION="${package_version}" \
            REPORT_PATH="out/publish-report-open-vsx.json" \
            node <<'NODE'
          const fs = require("fs");
          const report = {
            channel: process.env.REPORT_CHANNEL,
            state: process.env.REPORT_STATE,
            result: process.env.REPORT_RESULT,
            blocker: process.env.REPORT_BLOCKER,
            package: process.env.REPORT_PACKAGE,
            version: process.env.REPORT_VERSION,
            run_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            evidence: [],
          };
          fs.writeFileSync(process.env.REPORT_PATH, `${JSON.stringify(report, null, 2)}\n`);
          NODE
          }
          token="${OVSX_PAT:-${OPEN_VSX_TOKEN:-}}"
          if [[ -z "${token}" ]]; then echo "OPEN_VSX_SECRET_MISSING"; write_report "failed" "external_blocker" "OPEN_VSX_SECRET_MISSING"; exit 1; fi
          vsix="$(find out -maxdepth 1 -type f -name '*.vsix' -print -quit)"
          if [[ -z "${vsix}" ]]; then echo "EXTENSION_PACKAGE_MISSING"; write_report "failed" "workflow_failure" "EXTENSION_PACKAGE_MISSING"; exit 1; fi
          set +e
          output="$(npx --yes "ovsx@${OVSX_VERSION}" publish "${vsix}" --pat "${token}" 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "${output}"
          if [[ "${status}" -eq 0 ]]; then write_report "published" "fresh_publish_success" ""; exit 0; fi
          if printf '%s\n' "${output}" | grep -Eiq 'already.*published|version.*already|already exists'; then
            echo "OPEN_VSX_VERSION_ALREADY_PUBLISHED"
            write_report "already_published" "idempotent_noop" ""
            exit 0
          fi
          write_report "failed" "workflow_failure" "OPEN_VSX_PUBLISH_FAILED"
          exit "${status}"
      - name: Upload Open VSX publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-open-vsx
          path: out/publish-report-open-vsx.json
          if-no-files-found: ignore
