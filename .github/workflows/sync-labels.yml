name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/sync-labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync labels
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const desired = yaml.load(fs.readFileSync('.github/labels.yml', 'utf8'));
            const desiredNames = new Set(desired.map(label => label.name));
            for (const label of desired) {
              try {
                await github.rest.issues.updateLabel({
                  ...context.repo,
                  name: label.name,
                  color: String(label.color).replace(/^#/, ''),
                  description: label.description || ''
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: label.name,
                  color: String(label.color).replace(/^#/, ''),
                  description: label.description || ''
                });
              }
            }
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              ...context.repo,
              per_page: 100
            });
            for (const label of existing) {
              if (!desiredNames.has(label.name)) {
                await github.rest.issues.deleteLabel({ ...context.repo, name: label.name });
              }
            }
