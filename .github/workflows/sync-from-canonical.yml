name: Sync from canonical

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes; trade-off between freshness and minutes
  workflow_dispatch:
  repository_dispatch:
    types: [canonical-push]

permissions:
  contents: read

concurrency:
  group: sync-from-canonical
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout org mirror
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          token: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN || github.token }}

      - name: Pull from canonical and replay
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN || github.token }}
        run: |
          set -euo pipefail

          git config user.name  "oaslananka-lab[bot]"
          git config user.email "oaslananka-lab@users.noreply.github.com"

          git remote add canonical "https://github.com/oaslananka/kicad-studio.git"
          git fetch origin --prune '+refs/heads/*:refs/remotes/origin/*'
          git fetch canonical --prune --tags '+refs/heads/*:refs/remotes/canonical/*'

          # Replay every canonical branch into the org mirror.
          # Canonical repository is authoritative.
          for ref in $(git for-each-ref --format='%(refname:lstrip=3)' refs/remotes/canonical); do
            [ "$ref" = "HEAD" ] && continue

            if git show-ref --verify --quiet "refs/remotes/origin/${ref}"; then
              local_sha="$(git rev-parse "refs/remotes/origin/${ref}")"
            else
              local_sha=""
            fi

            canonical_sha="$(git rev-parse "refs/remotes/canonical/${ref}")"

            if [ "$local_sha" = "$canonical_sha" ]; then
              echo "Branch ${ref} already matches canonical."
              continue
            fi

            echo "Syncing branch ${ref}: origin=${local_sha:-missing} canonical=${canonical_sha}"

            if [ "$ref" = "main" ]; then
              canonical_tree="$(git rev-parse "refs/remotes/canonical/main^{tree}")"

              if git show-ref --verify --quiet refs/remotes/origin/main; then
                origin_tree="$(git rev-parse "refs/remotes/origin/main^{tree}")"
                if [ "$canonical_tree" = "$origin_tree" ]; then
                  echo "Skipping main; canonical and origin trees already match."
                  continue
                fi
              fi

              sync_branch="sync/canonical-main"
              sync_ref="refs/heads/${sync_branch}"

              if git ls-remote --exit-code --heads origin "${sync_branch}" >/dev/null 2>&1; then
                remote_sync_sha="$(git ls-remote --heads origin "${sync_branch}" | awk '{print $1}')"
                git push \
                  --force-with-lease="${sync_ref}:${remote_sync_sha}" \
                  origin \
                  "refs/remotes/canonical/main:${sync_ref}"
              else
                git push origin "refs/remotes/canonical/main:${sync_ref}"
              fi

              existing_pr="$(gh pr list \
                --repo "${{ github.repository }}" \
                --head "${sync_branch}" \
                --base main \
                --state open \
                --json number \
                --jq '.[0].number // empty')"

              if [ -n "$existing_pr" ]; then
                echo "Main sync PR already open: #${existing_pr}"
              else
                gh pr create \
                  --repo "${{ github.repository }}" \
                  --head "${sync_branch}" \
                  --base main \
                  --title "Sync main from canonical" \
                  --body "Synchronizes protected main branch from canonical repository oaslananka/kicad-studio."
              fi

              continue
            fi

            if [ -n "$local_sha" ]; then
              git push \
                --force-with-lease="refs/heads/${ref}:${local_sha}" \
                origin \
                "refs/remotes/canonical/${ref}:refs/heads/${ref}"
            else
              git push origin "refs/remotes/canonical/${ref}:refs/heads/${ref}"
            fi
          done

          # Replay tags.
          git push origin --tags --force

          # Prune branches that no longer exist on canonical.
          # Keep main and workflow-managed sync branch.
          for short in $(git for-each-ref --format='%(refname:lstrip=3)' refs/remotes/origin); do
            [ "$short" = "HEAD" ] && continue

            case "$short" in
              main|sync/canonical-main)
                continue
                ;;
            esac

            if ! git show-ref --verify --quiet "refs/remotes/canonical/${short}"; then
              echo "Deleting branch ${short}; it no longer exists on canonical."
              git push origin --delete "$short"
            fi
          done
