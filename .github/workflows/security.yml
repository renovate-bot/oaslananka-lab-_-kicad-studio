name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  TRIVY_VERSION: 0.70.0

jobs:
  trivy:
    name: Trivy (filesystem scan)
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Trivy
        run: |
          tmp="$(mktemp -d)"
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          base_url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          curl -fsSLo "${tmp}/${archive}" "${base_url}/${archive}"
          curl -fsSLo "${tmp}/checksums.txt" "${base_url}/trivy_${TRIVY_VERSION}_checksums.txt"
          grep " ${archive}$" "${tmp}/checksums.txt" > "${tmp}/checksum.txt"
          (cd "${tmp}" && sha256sum -c checksum.txt)
          tar -xzf "${tmp}/${archive}" -C "${tmp}" trivy
          sudo install -m 0755 "${tmp}/trivy" /usr/local/bin/trivy
          rm -rf "${tmp}"
          trivy --version
      - name: Run Trivy vulnerability scanner
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            .
      - name: Upload Trivy SARIF
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: trivy-results.sarif

  pnpm-audit:
    name: pnpm audit
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level high

  workflow-security:
    name: Workflow security (zizmor)
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Run zizmor
        run: uvx zizmor .github/workflows/ --min-severity medium
