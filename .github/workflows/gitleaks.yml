name: Gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '42 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  gitleaks:
    name: Gitleaks
    if: >-
      github.repository == 'oaslananka-lab/kicad-studio' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          version=8.30.1
          archive="gitleaks_${version}_linux_x64.tar.gz"
          tmp="$(mktemp -d)"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          curl -fsSLo "${tmp}/${archive}" "${base_url}/${archive}"
          curl -fsSLo "${tmp}/checksums.txt" "${base_url}/gitleaks_${version}_checksums.txt"
          grep " ${archive}$" "${tmp}/checksums.txt" > "${tmp}/checksum.txt"
          (cd "${tmp}" && sha256sum -c checksum.txt)
          tar -xzf "${tmp}/${archive}" -C "${tmp}" gitleaks
          sudo install -m 0755 "${tmp}/gitleaks" /usr/local/bin/gitleaks
          rm -rf "${tmp}"
          gitleaks version
      - name: Scan repository
        run: gitleaks detect --no-banner --redact --source .
