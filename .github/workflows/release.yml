name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v2.6.0)'
        required: true
      publish:
        description: Publish to registries
        type: choice
        default: 'false'
        options: ['false', 'true']
      approval:
        description: Type APPROVE_RELEASE to confirm publish
        required: false

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate approval
        run: |
          if [ "${{ inputs.publish }}" = "true" ] && [ "${{ inputs.approval }}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish" >&2; exit 1
          fi

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: task install

      - name: Build
        run: task build

      - name: Package
        run: task package

      - name: Build provenance attestation
        if: hashFiles('*.vsix') != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.vsix'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Verify required Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify_doppler_secrets.sh

      - name: Publish
        if: inputs.publish == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project all --config main -- bash scripts/publish.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh_args=(--repo "${{ github.repository }}" \
                   --title "${{ inputs.version }}" \
                   --generate-notes)
          if [ "${{ inputs.publish }}" != "true" ]; then
            gh_args+=(--draft)
          fi
          assets=()
          if compgen -G "*.vsix" > /dev/null; then assets+=(*.vsix); fi
          gh release create "${{ inputs.version }}" "${gh_args[@]}" "${assets[@]}"
