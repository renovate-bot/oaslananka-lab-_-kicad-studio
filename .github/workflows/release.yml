name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v2.6.0)'
        required: true
      publish:
        description: Publish to registries
        type: choice
        default: 'false'
        options: ['false', 'true']
      approval:
        description: Type APPROVE_RELEASE to confirm publish
        required: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate approval
        env:
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          RELEASE_APPROVAL: ${{ inputs.approval }}
        run: |
          if [ "${PUBLISH_REQUESTED}" = "true" ] && [ "${RELEASE_APPROVAL}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish" >&2; exit 1
          fi

      - name: Validate version and package metadata
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node scripts/check-release-inputs.js

      - name: Validate release tag exists
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            echo "Release tag ${RELEASE_VERSION} must exist before Release runs." >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm exec -- task build

      - name: Package
        run: npm exec -- task package

      - name: Validate VSIX package inputs
        run: npm run package:validate

      - name: Create checksums and SBOM
        run: npm run release:assets

      - name: Build provenance attestation
        if: hashFiles('*.vsix') != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            *.vsix
            SHA256SUMS.txt
            sbom.cdx.json

      - name: Publish
        if: inputs.publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          PUBLISH_TARGET: all
        run: bash scripts/publish.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh_args=(--repo "${GITHUB_REPOSITORY}" \
                   --title "${RELEASE_VERSION}" \
                   --generate-notes)
          if [ "${PUBLISH_REQUESTED}" != "true" ]; then
            gh_args+=(--draft)
          fi
          assets=()
          if compgen -G "*.vsix" > /dev/null; then assets+=(*.vsix); fi
          if [ -f SHA256SUMS.txt ]; then assets+=(SHA256SUMS.txt); fi
          if [ -f sbom.cdx.json ]; then assets+=(sbom.cdx.json); fi
          gh release create "${RELEASE_VERSION}" "${gh_args[@]}" "${assets[@]}"
