name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v2.6.0)'
        required: true
      publish:
        description: Publish to registries
        type: choice
        default: 'false'
        options: ['false', 'true']
      approval:
        description: Type APPROVE_RELEASE to confirm publish
        required: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Validate approval
        run: |
          if [ "${{ inputs.publish }}" = "true" ] && [ "${{ inputs.approval }}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish" >&2; exit 1
          fi

      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm exec -- task build

      - name: Package
        run: npm exec -- task package

      - name: Build provenance attestation
        if: hashFiles('*.vsix') != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: '*.vsix'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73

      - name: Verify required Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify_doppler_secrets.sh

      - name: Publish
        if: inputs.publish == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project all --config main -- bash scripts/publish.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh_args=(--repo "${{ github.repository }}" \
                   --title "${{ inputs.version }}" \
                   --generate-notes)
          if [ "${{ inputs.publish }}" != "true" ]; then
            gh_args+=(--draft)
          fi
          assets=()
          if compgen -G "*.vsix" > /dev/null; then assets+=(*.vsix); fi
          gh release create "${{ inputs.version }}" "${gh_args[@]}" "${assets[@]}"
