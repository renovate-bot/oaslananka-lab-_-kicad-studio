name: Feature Request
description: Suggest an idea for KiCad Studio
labels: ['type:feature']
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A concise description of what the problem is.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A concise description of any alternative solutions or features you've considered.
