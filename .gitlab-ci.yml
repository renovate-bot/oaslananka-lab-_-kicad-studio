image: node:24-bookworm

stages:
  - validate

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

before_script:
  - corepack enable
  - corepack prepare pnpm@11.0.8 --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm install --frozen-lockfile

validate:
  stage: validate
  script:
    - pnpm run check:ci
