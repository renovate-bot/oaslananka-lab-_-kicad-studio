trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  NODE_VERSION: '24.x'

stages:
  - stage: CI
    displayName: CI
    jobs:
      - job: Matrix
        displayName: Full CI Pipeline
        timeoutInMinutes: 30
        strategy:
          matrix:
            linux:
              imageName: ubuntu-24.04
            windows:
              imageName: windows-2025
            macos:
              imageName: macOS-15
        pool:
          vmImage: $(imageName)
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Use Node.js $(NODE_VERSION)
          - script: |
              corepack enable
              corepack prepare pnpm@11.0.8 --activate
              pnpm install --frozen-lockfile
            displayName: Install dependencies
          - script: pnpm exec task ci
            displayName: Run CI
